{{- if and .Values.monitor.enabled (.Values.monitor.serviceMonitor).enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "hami.dra.monitor.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hami-dra-monitor.selectorLabels" . | nindent 4 }}
    {{- with (.Values.monitor.serviceMonitor).labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "hami-dra-monitor.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: metrics
      path: {{ (.Values.monitor.serviceMonitor).path | default "/metrics" }}
      interval: {{ (.Values.monitor.serviceMonitor).interval | default "15s" }}
      scrapeTimeout: {{ (.Values.monitor.serviceMonitor).scrapeTimeout | default "10s" }}
{{- end }}
